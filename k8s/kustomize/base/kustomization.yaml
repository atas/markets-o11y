apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: markets-o11y-prod

labels:
  - pairs:
      app.kubernetes.io/name: markets-o11y
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true

resources:
  # Namespace
  - namespace.yaml

  # PVCs
  - pvcs/pvcs.yaml

  # ConfigMaps (non-generated)
  - configmaps/app-config.yaml
  - configmaps/worker-logs-dashboard.yaml

  # Deployments
  - deployments/timescaledb.yaml
  - deployments/worker.yaml
  - deployments/grafana.yaml

  # Services
  - services/services.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: db-init-scripts
    files:
      - init.sql=../../../db/init.sql
  - name: worker-config
    files:
      - config.yaml=../../../config.yaml
  - name: grafana-dashboards
    files:
      - markets.json=../../../grafana/dashboards/markets.json
  - name: grafana-provisioning
    files:
      - datasources.yaml=../../../grafana/provisioning/datasources/timescaledb.yaml
      - dashboards.yaml=../../../grafana/provisioning/dashboards/dashboard.yaml
      - alerting.yaml=../../../grafana/provisioning/alerting/example-alerts.yaml
