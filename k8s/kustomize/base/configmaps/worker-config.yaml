apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
data:
  config.yaml: |
    # markets-o11y configuration
    # Edit this ConfigMap to customize your symbol watchlist.

    defaults:
      fetch_interval: 15m   # how often to poll for new prices
      history_years: 10     # how many years of history to backfill on first run

    symbols:
      stocks:
        - symbol: AAPL
        - symbol: MSFT
        - symbol: GOOGL
        - symbol: AMZN
        - symbol: TSLA
        - symbol: NVDA
        - symbol: AMD
        - symbol: INTC
        - symbol: ORCL
        - symbol: BA
        - symbol: ETSY
        - symbol: AVGO      # Broadcom
        - symbol: TSM       # TSMC
        - symbol: ASML      # ASML (Dutch lithography)
        - symbol: LMT       # Lockheed Martin
        - symbol: SNOW      # Snowflake

      etfs:
        - symbol: VOO       # Vanguard S&P 500 ETF
        - symbol: VTI       # Vanguard Total Stock Market ETF
        - symbol: VWRD.L    # Vanguard FTSE All-World (London)

      commodities:
        - symbol: GC=F      # Gold futures
        - symbol: SI=F      # Silver futures
        - symbol: CL=F      # Crude oil (WTI)

      forex:
        - symbol: EURUSD=X
        - symbol: GBPUSD=X
        - symbol: EURTRY=X  # EUR/TRY

      crypto:
        - symbol: BTC-USD
        - symbol: ETH-USD

      indices:
        - symbol: ^GSPC     # S&P 500
        - symbol: ^DJI      # Dow Jones Industrial Average
