apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-logs-dashboard
  labels:
    grafana_dashboard: "1"
data:
  markets-o11y-worker-logs.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 50,
                "gradientMode": "none",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" }
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "" },
              "editorMode": "code",
              "expr": "sum(count_over_time({namespace=\"markets-o11y-prod\", pod=~\"worker.*\"} |~ `(?i)(error|exception|traceback)` [$__auto]))",
              "legendFormat": "errors",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "markets-o11y-worker Error Volume",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "loki", "uid": "" },
          "gridPos": { "h": 18, "w": 24, "x": 0, "y": 6 },
          "id": 2,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "" },
              "editorMode": "code",
              "expr": "{namespace=\"markets-o11y-prod\", pod=~\"worker.*\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "markets-o11y-worker Logs",
          "type": "logs"
        }
      ],
      "schemaVersion": 39,
      "tags": ["markets-o11y", "loki"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "markets-o11y / markets-o11y-worker Logs",
      "uid": "markets-o11y-worker-logs"
    }
